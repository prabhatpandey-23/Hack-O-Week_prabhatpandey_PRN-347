<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Panda Weather Report</title>

<style>
  body {
    font-family: Arial, sans-serif;
    background: #e6f2ff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    transition: 0.3s;
  }

  .dark {
    background: #1e1e2f;
    color: white;
  }

  .weather-card {
    background: white;
    border-radius: 15px;
    padding: 20px;
    width: 320px;
    text-align: center;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    transition: 0.3s;
  }

  .dark .weather-card {
    background: #2c2c3c;
  }

  .title {
    font-size: 22px;
    font-weight: bold;
  }

  .panda {
    font-size: 40px;
  }

  .temp {
    font-size: 42px;
    color: #0077b6;
    margin: 10px 0;
  }

  .condition {
    margin-bottom: 10px;
  }

  .details {
    font-size: 14px;
    color: gray;
  }

  .dark .details {
    color: #ccc;
  }

  button {
    margin-top: 15px;
    padding: 8px 12px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: #0077b6;
    color: white;
  }

  button:hover {
    background: #005f8a;
  }
</style>
</head>

<body>

<div class="weather-card">
  <div class="panda">🐼</div>
  <div class="title">Panda Weather Report</div>
  <div id="location">Nagpur, India</div>
  <div id="temp" class="temp">32°C</div>
  <div id="condition" class="condition">Sunny ☀️</div>

  <div id="details" class="details">
    Humidity: 45% <br>
    Wind: 10 km/h <br>
    Forecast: Clear sky
  </div>

  <button onclick="refreshWeather()">🔄 Refresh</button>
  <button onclick="toggleDarkMode()">🌙 Toggle Mode</button>
</div>

<script>
  function refreshWeather() {
    const temps = [30, 32, 34, 29, 31];
    const conditions = ["Sunny ☀️", "Cloudy ☁️", "Rainy 🌧️"];

    let temp = temps[Math.floor(Math.random() * temps.length)];
    let condition = conditions[Math.floor(Math.random() * conditions.length)];

    document.getElementById("temp").innerText = temp + "°C";
    document.getElementById("condition").innerText = condition;

    document.getElementById("details").innerHTML =
      "Humidity: " + (40 + Math.floor(Math.random()*20)) + "%<br>" +
      "Wind: " + (5 + Math.floor(Math.random()*10)) + " km/h<br>" +
      "Forecast: Updated just now";
  }

  function toggleDarkMode() {
    document.body.classList.toggle("dark");
  }
</script>

</body>
</html>
