<!DOCTYPE html>
<html>
<head>
<title>Prabhat Photography</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0d0d0d;
color:white;
text-align:center;
}

/* Header */

header{
padding:20px;
font-size:30px;
font-weight:bold;
background:#111;
}

/* Category Buttons */

.buttons{
margin:20px;
}

.buttons button{
padding:10px 20px;
margin:5px;
border:none;
border-radius:20px;
cursor:pointer;
background:#ff9800;
color:white;
font-weight:bold;
}

.buttons button:hover{
background:#ff5722;
}

/* Gallery */

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
padding:30px;
}

.gallery img{
width:100%;
height:220px;
object-fit:cover;
border-radius:10px;
cursor:pointer;
transition:0.4s;
}

.gallery img:hover{
transform:scale(1.08);
}

/* Lightbox */

.lightbox{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
}

.lightbox img{
width:70%;
max-width:800px;
border-radius:10px;
}

.close{
position:absolute;
top:20px;
right:40px;
font-size:40px;
cursor:pointer;
}

.prev,.next{
position:absolute;
top:50%;
font-size:50px;
cursor:pointer;
}

.prev{left:40px;}
.next{right:40px;}

.download{
margin-top:15px;
padding:10px 20px;
background:#ff9800;
border:none;
border-radius:20px;
cursor:pointer;
}

</style>
</head>

<body>

<header>📸 Prabhat Photography</header>

<div class="buttons">
<button onclick="filter('all')">All</button>
<button onclick="filter('nature')">Nature</button>
<button onclick="filter('travel')">Travel</button>
<button onclick="filter('portrait')">Portrait</button>
</div>

<div class="gallery">

<img src="https://picsum.photos/id/1015/600/400" class="nature">
<img src="https://picsum.photos/id/1016/600/400" class="nature">
<img src="https://picsum.photos/id/1025/600/400" class="nature">

<img src="https://picsum.photos/id/1035/600/400" class="travel">
<img src="https://picsum.photos/id/1043/600/400" class="travel">
<img src="https://picsum.photos/id/1050/600/400" class="travel">

<img src="https://picsum.photos/id/1005/600/400" class="portrait">
<img src="https://picsum.photos/id/1006/600/400" class="portrait">
<img src="https://picsum.photos/id/1008/600/400" class="portrait">

</div>

<div class="lightbox" id="lightbox">

<span class="close">&times;</span>

<span class="prev">&#10094;</span>

<img id="lightbox-img">

<span class="next">&#10095;</span>

<a id="download" download>
<button class="download">Download Photo</button>
</a>

</div>

<script>

let images = document.querySelectorAll(".gallery img");
let lightbox = document.getElementById("lightbox");
let lightboxImg = document.getElementById("lightbox-img");
let download = document.getElementById("download");

let current = 0;

images.forEach((img,index)=>{
img.onclick=()=>{
lightbox.style.display="flex";
lightboxImg.src = img.src;
download.href = img.src;
current = index;
}
});

document.querySelector(".close").onclick=()=>{
lightbox.style.display="none";
}

document.querySelector(".next").onclick=()=>{
current++;
if(current>=images.length) current=0;
lightboxImg.src = images[current].src;
download.href = images[current].src;
}

document.querySelector(".prev").onclick=()=>{
current--;
if(current<0) current=images.length-1;
lightboxImg.src = images[current].src;
download.href = images[current].src;
}

/* Filter */

function filter(category){

let imgs = document.querySelectorAll(".gallery img");

imgs.forEach(img=>{
if(category=="all" || img.classList.contains(category)){
img.style.display="block";
}else{
img.style.display="none";
}
});

}

</script>

</body>
</html>
